---
- hosts: all
  become: true
  gather_facts: true

  roles:
    - python
  vars_files:
    - group_vars/vault.yml
    
- hosts: all
  become: true
  gather_facts: true

  vars:
    ansible_python_interpreter: /opt/ansible-venv/bin/python
  vars_files:
    - group_vars/vault.yml
    
  roles:
    - docker
    - git
    - helm
    - k3s
    - nginx-ingress
    - cert-manager
    - alertmanager
    - prometheus
    - grafana
    - transfer_files
