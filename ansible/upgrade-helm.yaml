---
- name: Deploy/Upgrade Baytak Helm Chart
  hosts: k3s_server
  become: true

  vars:
    release_name: baytak
    chart_path: /opt/baytak/helm
    namespace: baytak
    kubeconfig_path: /etc/rancher/k3s/k3s.yaml

    # Images
    backend_repo: "abdelwahabadam/baytak"
    frontend_repo: "abdelwahabadam/baytak"

    backend_tag: "{{ backend_tag | default('backend-latest') }}"
    frontend_tag: "{{ frontend_tag | default('frontend-latest') }}"

  tasks:

    - name: Deploy/Upgrade Helm Release
      kubernetes.core.helm:
        kubeconfig: "{{ kubeconfig_path }}"

        name: "{{ release_name }}"
        chart_ref: "{{ chart_path }}"

        release_namespace: "{{ namespace }}"
        create_namespace: true
        release_state: present

        atomic: true
        wait: true
        wait_timeout: 10m
        reuse_values: true

        values:

          ###########################################################
          # Backend
          ###########################################################

          backend:
            image:
              repository: "{{ backend_repo }}"
              tag: "{{ backend_tag }}"
              pullPolicy: Always

          ###########################################################
          # Frontend
          ###########################################################

          frontend:
            image:
              repository: "{{ frontend_repo }}"
              tag: "{{ frontend_tag }}"
              pullPolicy: Always

          ###########################################################
          # Backend Secret
          ###########################################################

          backendSecret:
            DATABASE_USER: "{{ vault_database_user }}"
            DATABASE_PASSWORD: "{{ vault_database_password }}"

            JWT_SECRET_KEY: "{{ vault_jwt_secret_key }}"

            BOOTSTRAP_ADMIN_EMAIL: "{{ vault_bootstrap_admin_email }}"
            BOOTSTRAP_ADMIN_PASSWORD: "{{ vault_bootstrap_admin_password }}"

            SMTP_USERNAME: "{{ vault_smtp_username }}"
            SMTP_PASSWORD: "{{ vault_smtp_password }}"
            SMTP_FROM: "{{ vault_smtp_from }}"

          ###########################################################
          # DockerHub Secret
          ###########################################################

          registry:
            username: "{{ vault_dockerhub_username }}"
            password: "{{ vault_dockerhub_token }}"
            email: "{{ vault_dockerhub_email }}"

      register: helm_deploy

    - name: Show deployment summary
      debug:
        msg:
          - "Helm Release : {{ release_name }}"
          - "Namespace    : {{ namespace }}"
          - "Backend      : {{ backend_repo }}:{{ backend_tag }}"
          - "Frontend     : {{ frontend_repo }}:{{ frontend_tag }}"

    - name: Show Helm module output
      debug:
        var: helm_deploy

    - name: Get Helm release information
      kubernetes.core.helm_info:
        kubeconfig: "{{ kubeconfig_path }}"
        release_namespace: "{{ namespace }}"
        release_name: "{{ release_name }}"
      register: helm_info

    - name: Display Helm release information
      debug:
        var: helm_info.status

    - name: Wait for backend rollout
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ namespace }}"
        name: backend-deployment
      register: backend_status
      retries: 30
      delay: 10
      until: >
        backend_status.resources[0].status.availableReplicas ==
        backend_status.resources[0].status.replicas

    - name: Wait for frontend rollout
      kubernetes.core.k8s_info:
        kubeconfig: "{{ kubeconfig_path }}"
        api_version: apps/v1
        kind: Deployment
        namespace: "{{ namespace }}"
        name: frontend-deployment
      register: frontend_status
      retries: 30
      delay: 10
      until: >
        frontend_status.resources[0].status.availableReplicas ==
        frontend_status.resources[0].status.replicas

    - name: Deployment completed
      debug:
        msg:
          - "Baytak deployment completed successfully."
          - "Backend image : {{ backend_repo }}:{{ backend_tag }}"
          - "Frontend image: {{ frontend_repo }}:{{ frontend_tag }}"