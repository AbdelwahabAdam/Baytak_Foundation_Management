services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-charity}
      POSTGRES_USER: ${POSTGRES_USER:-charity}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-charity}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-charity}
      DATABASE_USER: ${POSTGRES_USER:-charity}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-charity}
      APP_NAME: ${APP_NAME:-Baytak Foundation API}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-local-development-secret-before-production}
      ALLOWED_ORIGINS: '["http://localhost:8080","http://localhost:5173"]'
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:-http://localhost:8080}
      PASSWORD_RESET_MINUTES: ${PASSWORD_RESET_MINUTES:-30}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@charity.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-ChangeMe123!}
      REPORT_STORAGE_PATH: /app/reports
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - report_data:/app/reports
    networks:
      default:
        aliases:
          - backend-service

  frontend:
    build:
      context: ./frontend
      args:
        VITE_APP_NAME: ${VITE_APP_NAME:-Baytak Foundation}
        VITE_APP_SHORT_NAME: ${VITE_APP_SHORT_NAME:-Baytak}
        VITE_APP_TAGLINE: ${VITE_APP_TAGLINE:-Community charity management}
        VITE_APP_DESCRIPTION: ${VITE_APP_DESCRIPTION:-Transparent, people-first charity operations.}
        VITE_APP_CONTACT_EMAIL: ${VITE_APP_CONTACT_EMAIL:-info@baytakfoundation.org}
        VITE_APP_LOGO_PATH: ${VITE_APP_LOGO_PATH:-/baytak-logo.png}
        VITE_DEFAULT_LOCALE: ${VITE_DEFAULT_LOCALE:-ar}
        VITE_NAVIGATION_TITLE: ${VITE_NAVIGATION_TITLE:-Workspace}
        VITE_TAB_OVERVIEW: ${VITE_TAB_OVERVIEW:-Overview}
        VITE_TAB_DONORS: ${VITE_TAB_DONORS:-Donors}
        VITE_TAB_DONATIONS: ${VITE_TAB_DONATIONS:-Donations}
        VITE_TAB_DONATION_TYPES: ${VITE_TAB_DONATION_TYPES:-Donation types}
        VITE_TAB_WAREHOUSE: ${VITE_TAB_WAREHOUSE:-Warehouse}
        VITE_TAB_CASES: ${VITE_TAB_CASES:-Cases}
        VITE_TAB_ACTIVITIES: ${VITE_TAB_ACTIVITIES:-المشروعات}
        VITE_TAB_CUSTODY: ${VITE_TAB_CUSTODY:-Custody}
        VITE_TAB_APPROVALS: ${VITE_TAB_APPROVALS:-Approvals}
        VITE_TAB_REPORTS: ${VITE_TAB_REPORTS:-Reports}
        VITE_TAB_SCHEDULED_REPORTS: ${VITE_TAB_SCHEDULED_REPORTS:-Scheduled reports}
        VITE_TAB_USERS: ${VITE_TAB_USERS:-Users}
        VITE_TAB_SETTINGS: ${VITE_TAB_SETTINGS:-Settings}
        VITE_COLOR_PRIMARY: ${VITE_COLOR_PRIMARY:-#1765a7}
        VITE_COLOR_PRIMARY_DARK: ${VITE_COLOR_PRIMARY_DARK:-#104e85}
        VITE_COLOR_ACCENT: ${VITE_COLOR_ACCENT:-#2a78ba}
        VITE_COLOR_SIDEBAR: ${VITE_COLOR_SIDEBAR:-#123b65}
        VITE_COLOR_BACKGROUND: ${VITE_COLOR_BACKGROUND:-#f5f8fc}
        VITE_COLOR_SURFACE: ${VITE_COLOR_SURFACE:-#ffffff}
        VITE_COLOR_TEXT: ${VITE_COLOR_TEXT:-#162b3d}
        VITE_COLOR_MUTED_TEXT: ${VITE_COLOR_MUTED_TEXT:-#607285}
        VITE_COLOR_SUCCESS: ${VITE_COLOR_SUCCESS:-#167044}
        VITE_COLOR_WARNING: ${VITE_COLOR_WARNING:-#a86b09}
        VITE_COLOR_DANGER: ${VITE_COLOR_DANGER:-#ae3f34}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
  report_data:
