apiVersion: cert-manager.io/v1
kind: ClusterIssuer

metadata:
  name: letsencrypt-prod
spec:
  acme:

    email: {{ .Values.issuer.spec.email }}

    server: {{ .Values.issuer.spec.server }}

    privateKeySecretRef:
      name: letsencrypt-prod

    solvers:
      - http01:
          ingress:
            class: nginx