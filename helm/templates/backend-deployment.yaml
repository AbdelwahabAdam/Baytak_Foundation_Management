apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment
  namespace: {{ .Values.namespace.name }}
  labels:
    app: backend

spec:
  replicas: {{ .Values.backend.replicas }}

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: {{ .Values.backend.image }}
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: {{ .Values.backend.port }}

          envFrom:
            - configMapRef:
                name: {{ .Values.backend.configMap }}

            - secretRef:
                name: {{ .Values.backend.secret }}

          volumeMounts:
            - name: report-data
              mountPath: /app/reports

          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /health
              port: {{ .Values.backend.port }}
            periodSeconds: 5
            failureThreshold: 30

          resources:
            requests:
              cpu: {{ .Values.backend.resources.requests.cpu }}
              memory: {{ .Values.backend.resources.requests.memory }}

            limits:
              cpu: {{ .Values.backend.resources.limits.cpu }}
              memory: {{ .Values.backend.resources.limits.memory }}

      volumes:
        - name: report-data
          hostPath:
            path: /data/report_data
            type: DirectoryOrCreate
