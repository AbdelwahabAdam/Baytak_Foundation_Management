apiVersion: v1
kind: ConfigMap

metadata:
  name: {{ .Values.backend.configMap }}
  namespace: {{ .Values.namespace.name }}

data:
  DATABASE_HOST: {{ .Values.backendConfigmap.data.DATABASE_HOST | quote }}
  DATABASE_PORT: {{ .Values.backendConfigmap.data.DATABASE_PORT | quote }}
  DATABASE_NAME: {{ .Values.backendConfigmap.data.DATABASE_NAME | quote }}

  APP_NAME: {{ .Values.backendConfigmap.data.APP_NAME | quote }}
  ENVIRONMENT: {{ .Values.backendConfigmap.data.ENVIRONMENT | quote }}

  JWT_ALGORITHM: {{ .Values.backendConfigmap.data.JWT_ALGORITHM | quote }}
  ACCESS_TOKEN_MINUTES: {{ .Values.backendConfigmap.data.ACCESS_TOKEN_MINUTES | quote }}
  REFRESH_TOKEN_DAYS: {{ .Values.backendConfigmap.data.REFRESH_TOKEN_DAYS | quote }}

  SCHEDULER_ENABLED: {{ .Values.backendConfigmap.data.SCHEDULER_ENABLED | quote }}

  SMTP_HOST: {{ .Values.backendConfigmap.data.SMTP_HOST | quote }}
  SMTP_PORT: {{ .Values.backendConfigmap.data.SMTP_PORT | quote }}
  SMTP_STARTTLS: {{ .Values.backendConfigmap.data.SMTP_STARTTLS | quote }}

  FRONTEND_APP_URL: {{ .Values.backendConfigmap.data.FRONTEND_APP_URL | quote }}

  PASSWORD_RESET_MINUTES: {{ .Values.backendConfigmap.data.PASSWORD_RESET_MINUTES | quote }}

  ALLOWED_ORIGINS: {{ .Values.backendConfigmap.data.ALLOWED_ORIGINS | quote }}