apiVersion: v1
kind: Secret

metadata:
  name: backend-secret
  namespace: {{ .Values.namespace.name }}
type: Opaque

stringData:
  POSTGRES_USER: {{ .Values.secret.POSTGRES_USER }}
  POSTGRES_PASSWORD: {{ .Values.secret.POSTGRES_PASSWORD }}
  DATABASE_URL: {{ printf "postgresql+psycopg://%s:%s@db-service:5432/%s" .Values.secret.POSTGRES_USER .Values.secret.POSTGRES_PASSWORD .Values.configmap.data.DATABASE_NAME | quote }}


  JWT_SECRET_KEY: {{ .Values.secret.JWT_SECRET_KEY }}

  BOOTSTRAP_ADMIN_EMAIL: {{ .Values.secret.BOOTSTRAP_ADMIN_EMAIL }}
  BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.secret.BOOTSTRAP_ADMIN_PASSWORD }}

  SMTP_USERNAME: {{ .Values.secret.SMTP_USERNAME }}
  SMTP_PASSWORD: {{ .Values.secret.SMTP_PASSWORD }}
  SMTP_FROM: {{ .Values.secret.SMTP_FROM }}