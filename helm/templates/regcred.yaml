{{- $auth := printf "%s:%s" .Values.registry.username .Values.registry.password | b64enc -}}

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imagePullSecrets.name }}
type: kubernetes.io/dockerconfigjson

data:
  .dockerconfigjson: {{ dict "auths" (dict "https://index.docker.io/v1/" (dict "username" .Values.registry.username "password" .Values.registry.password "email" .Values.registry.email "auth" $auth)) | toJson | b64enc }}